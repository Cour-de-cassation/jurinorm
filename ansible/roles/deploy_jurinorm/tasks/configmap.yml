---
- name: Creation de la ConfigMap du batch
  k8s:
    apply: true
    state: present
    verify_ssl: true
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: batch-config
        namespace: "{{ jurinorm_namespace }}"
        labels:
          app: "{{ jurinorm_namespace }}"
      data:
        DBSDER_API_URL: "{{ dbsder_api_url }}"
        NLP_PSEUDONYMISATION_API_URL: "{{ nlp_pseudonymisation_api_url }}"
        ZONING_API_URL: "{{ zoning_api_url}}"
        S3_URL: "{{ s3_url }}"
        S3_REGION: "{{ s3_region }}"
        S3_BUCKET_NAME_RAW_TJ: "{{ s3_bucket_name_raw_tj }}"
        S3_BUCKET_NAME_PDF: "{{ s3_bucket_name_pdf }}"
        S3_BUCKET_NAME_PORTALIS: "{{ s3_bucket_name_portalis }}"
        NODE_ENV: "{{ node_env }}"
        NORMALIZATION_BATCH_SCHEDULE: "{{ normalization_batch_schedule }}"
        COLLECTION_JURICA_RAW: "{{ collection_jurica_raw }}"
        COLLECTION_JURINET_RAW: "{{ collection_jurinet_raw }}"
        ENV: "{{ env }}"
        BATCH_MAX_DECISIONS_CA: "{{ batch_max_decisions_ca }}"
        BATCH_MAX_DECISIONS_TJ: "{{ batch_max_decisions_tj }}"
        BATCH_MAX_DECISIONS_TCOM: "{{ batch_max_decisions_tcom }}"
        BATCH_MAX_DECISIONS_CPH: "{{ batch_max_decisions_cph }}"
...
